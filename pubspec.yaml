name: money_manager
description: "A personal finance manager app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # Charts
  fl_chart: ^0.67.0

  # Animations
  lottie: ^3.1.0

  # Auth & Security
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2

  # Typography
  google_fonts: ^6.2.1

  # Theming
  flex_color_scheme: ^8.0.0

  # Export
  pdf: ^3.10.8
  csv: ^6.0.0
  share_plus: ^9.0.0

  # Notifications
  flutter_local_notifications: ^17.2.2

  # Utils
  intl: ^0.20.0
  cupertino_icons: ^1.0.8
  path_provider: ^2.1.3
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  build_runner: ^2.4.13
  freezed: ^2.5.7
  freezed_annotation: ^2.4.4
  json_serializable: ^6.8.0

  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/animations/
    - assets/images/

  # Fonts served by google_fonts package at runtime — no local font assets needed.
